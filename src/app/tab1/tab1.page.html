<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>
      Pokedex
    </ion-title>
  </ion-toolbar>
  <ion-toolbar color="primary">
    <ion-searchbar (ionChange)="onSearchChange($event)" debounce="500" placeholder="Buscar Pokémon" animated></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding-top">
  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6" size-lg="4" *ngFor="let p of pokemon">
        <ion-card [routerLink]="['/', p.pokeIndex]" class="pokemon-card">
          <ion-card-header>
            <ion-card-subtitle>#{{ p.pokeIndex }}</ion-card-subtitle>
            <ion-card-title>{{ p.name | titlecase }}</ion-card-title>
          </ion-card-header>
          <ion-card-content class="ion-text-center">
            <ion-avatar class="pokemon-avatar">
              <img [src]="p.image" />
            </ion-avatar>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-infinite-scroll threshold="100px" (ionInfinite)="loadData($event)">
    <ion-infinite-scroll-content
      loadingSpinner="bubbles"
      loadingText="Cargando más Pokémon...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
